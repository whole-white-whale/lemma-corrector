name: "Publish"

on:
  release:
    types:
      - "published"

permissions:
  contents: "read"

jobs:
  build:
    runs-on: "ubuntu-latest"

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v7"

      - name: "Setup uv"
        uses: "astral-sh/setup-uv@v8.2.0"
        with:
          enable-cache: true

      - name: "Build"
        run: |
          uv build

      - name: "Upload distributions"
        uses: "actions/upload-artifact@v7"
        with:
          name: "dist"
          path: "dist"

  publish:
    runs-on: "ubuntu-latest"

    needs:
      - "build"

    permissions:
      id-token: "write"

    environment:
      name: "pypi"

    steps:
      - name: "Download distributions"
        uses: "actions/download-artifact@v8"
        with:
          name: "dist"
          path: "dist"

      - name: "Setup uv"
        uses: "astral-sh/setup-uv@v8.2.0"
        with:
          enable-cache: true

      - name: "Publish"
        run: |
          uv publish
