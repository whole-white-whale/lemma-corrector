name: "Build"

on:
  push:
    branches:
      - "main"

  pull_request:
    branches:
      - "main"

jobs:
  build:
    runs-on: "ubuntu-latest"

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v7"

      - name: "Setup uv"
        uses: "astral-sh/setup-uv@v8.2.0"
        with:
          enable-cache: true

      - name: "Install dependencies"
        run: |
          uv sync --dev

      - name: "Type check"
        run: |
          uv run pyright

      - name: "Test"
        run: |
          uv run pytest

      - name: "Lint"
        run: |
          uv run ruff check
